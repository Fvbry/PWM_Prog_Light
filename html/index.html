<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>PGRC - Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main>
        <h1>PGRC Light</h1>
        
        <section>
            <h2>Accedi</h2>
            <form id="form-login">
                <input type="text" id="log-user" placeholder="Nome utente" required>
                <input type="password" id="log-pass" placeholder="Password" required>
                <button type="submit">Entra</button>
            </form>
        </section>
        
        <hr><br>
        
        <section>
            <h2>Nuovo Utente? Registrati</h2>
            <form id="form-reg">
                <input type="text" id="reg-user" placeholder="Scegli un Nome utente" required>
                <input type="email" id="reg-email" placeholder="La tua Email" required>
                <input type="password" id="reg-pass" placeholder="Scegli una Password" required>
                <input type="password" id="reg-pass2" placeholder="Conferma Password" required>
                <button type="submit">Registrati</button>
            </form>
        </section>
    </main>
    <script src="../js/app.js"></script>
</body>
</html>
