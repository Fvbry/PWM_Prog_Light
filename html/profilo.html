<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Profilo - PGRC</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="home.html">Home (Ricerca)</a>
            <a href="ricettario.html">Mio Ricettario</a>
            <a href="profilo.html">Profilo</a>
            <button id="btn-esci" class="btn-logout">🚪 Esci</button>
        </nav>
    </header>
    
    <main>
        <h2>Il Tuo Profilo</h2>
        
        <section>
            <form id="form-profilo">
                <label>Username (Non modificabile):</label>
                <input type="text" id="mod-user" disabled>

                <label>Email:</label>
                <input type="email" id="mod-email" required>
                
                <label>Nuova Password:</label>
                <input type="password" id="mod-pass" placeholder="Scrivi la nuova password" required>

                <label>Conferma Nuova Password:</label>
                <input type="password" id="mod-pass2" placeholder="Ripeti la password" required>
                
                <button type="submit">Aggiorna Dati</button>
            </form>
        </section>
        
        <hr><br>
        
        <section>
            <h2>Elimina Account</h2>
            <button id="btn-elimina" class="btn-rosso">Elimina Profilo Definitivamente</button>
        </section>
    </main>
    <script src="../js/app.js"></script>
</body>
</html>
